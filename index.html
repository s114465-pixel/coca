<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飛行員大戰馬鈴薯</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #87ceeb;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#ui {
    position: fixed;
    left: 15px;
    top: 15px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px black;
}

#gameOver {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    background: rgba(0,0,0,0.5);
    font-size: 32px;
    text-shadow: 2px 2px 6px black;
}

button {
    margin-top: 20px;
    padding: 12px 24px;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="ui">時間: 0.0 秒</div>

<div id="gameOver">
    <div id="finalScore"></div>
    <button onclick="restart()">重新開始</button>
</div>

<canvas id="game"></canvas>

<script>
// ===== 測試（先寫測試，再寫實作的簡易 TDD 示範） =====
(function runTests() {
    function assert(name, condition) {
        console.log(
            (condition ? "✅ PASS: " : "❌ FAIL: ") + name
        );
    }

    function distance(x1,y1,x2,y2){
        return Math.hypot(x2-x1,y2-y1);
    }

    assert(
        "distance(0,0,3,4)=5",
        distance(0,0,3,4) === 5
    );
})();

// ===== 遊戲 =====

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const heroImg = new Image();
heroImg.src = "trump.png";

const potatoImg = new Image();
potatoImg.src = "potato.png";
let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const keys = {};

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

const player = {
    x: 0,
    y: 0,
    vx: 0,
    vy: 0,
    radius: 18,
    alive: true
};

let potatoes = [];
let particles = [];
let startTime = 0;
let spawnTimer = 0;

function resetGame() {
    player.x = w / 2;
    player.y = h / 2;
    player.vx = 0;
    player.vy = 0;
    player.alive = true;

    potatoes = [];
    particles = [];

    startTime = performance.now();
    spawnTimer = 0;

    document.getElementById("gameOver").style.display = "none";
}

resetGame();

function spawnPotato() {

    let side = Math.floor(Math.random() * 4);

    let x, y;

    if (side === 0) {
        x = -50;
        y = Math.random() * h;
    } else if (side === 1) {
        x = w + 50;
        y = Math.random() * h;
    } else if (side === 2) {
        x = Math.random() * w;
        y = -50;
    } else {
        x = Math.random() * w;
        y = h + 50;
    }

    let angle = Math.atan2(
        player.y - y,
        player.x - x
    );

    let speed = 2 + Math.random() * 4;

    potatoes.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 15
    });
}

function explodePlayer() {

    for (let i = 0; i < 120; i++) {

        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 8 + 1;

        particles.push({
            x: player.x,
            y: player.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 60 + Math.random() * 60,
            size: 3 + Math.random() * 5
        });
    }

    player.alive = false;

    const score =
        ((performance.now() - startTime) / 1000).toFixed(1);

    document.getElementById(
        "finalScore"
    ).textContent =
        `你被馬鈴薯打爆了！\n存活 ${score} 秒`;

    setTimeout(() => {
        document.getElementById("gameOver")
            .style.display = "flex";
    }, 1000);
}

function update() {

    if (player.alive) {

        const accel = 0.5;

        if (keys["w"]) player.vy -= accel;
        if (keys["s"]) player.vy += accel;
        if (keys["a"]) player.vx -= accel;
        if (keys["d"]) player.vx += accel;

        player.vx *= 0.97;
        player.vy *= 0.97;

        player.x += player.vx;
        player.y += player.vy;

        player.x = Math.max(
            player.radius,
            Math.min(w - player.radius, player.x)
        );

        player.y = Math.max(
            player.radius,
            Math.min(h - player.radius, player.y)
        );

        spawnTimer++;

        if (spawnTimer > 20) {
            spawnTimer = 0;
            spawnPotato();
        }

        for (let p of potatoes) {

            p.x += p.vx;
            p.y += p.vy;

            let dx = p.x - player.x;
            let dy = p.y - player.y;

            let dist = Math.hypot(dx, dy);

            if (
                dist <
                p.radius + player.radius
            ) {
                explodePlayer();
                break;
            }
        }
    }

    for (let part of particles) {
        part.x += part.vx;
        part.y += part.vy;
        part.vx *= 0.99;
        part.vy *= 0.99;
        part.life--;
    }

    particles = particles.filter(
        p => p.life > 0
    );

    const score =
        ((performance.now() - startTime) / 1000).toFixed(1);

    document.getElementById("ui")
        .textContent = `時間: ${score} 秒`;
}

function drawPlayer() {

    ctx.drawImage(
        heroImg,
        player.x - 40,
        player.y - 40,
        142,
        80
    );

}

function drawPotato(p) {

    ctx.drawImage(
        potatoImg,
        p.x - 20,
        p.y - 20,
        40,
        40
    );

}
function drawParticles() {

    for (let p of particles) {

        ctx.fillStyle =
            `rgba(255,80,80,${
                p.life / 120
            })`;

        ctx.fillRect(
            p.x,
            p.y,
            p.size,
            p.size
        );
    }
}

function draw() {

    ctx.clearRect(0, 0, w, h);

    // 雲
    ctx.fillStyle = "rgba(255,255,255,0.25)";

    for(let i=0;i<8;i++){
        ctx.beginPath();
        ctx.arc(
            (i*300 + performance.now()/40)% (w+200)-100,
            100 + i*60,
            40,
            0,
            Math.PI*2
        );
        ctx.fill();
    }

    for (let p of potatoes)
        drawPotato(p);

    if (player.alive)
        drawPlayer();

    drawParticles();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

function restart() {
    resetGame();
}
</script>

</body>
</html>
